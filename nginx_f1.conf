# /etc/nginx/sites-available/f1
# Config Nginx pour f1-analyse.le-petit-labo-du-big-seb.fr

server {
    listen 80;
    server_name f1-analyse.le-petit-labo-du-big-seb.fr;

    # Frontend React (fichiers statiques)
    root /var/www/f1_frontend;
    index index.html;

    # React Router — renvoie toujours index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API FastAPI
    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }
}
